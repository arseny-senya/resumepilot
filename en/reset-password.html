<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Reset Password | Resume Pilot</title>

    <meta name="robots" content="noindex, nofollow" />

    <link rel="icon" href="/img/favicon.ico" />
    <link rel="stylesheet" href="../style.css" />
  </head>

  <body>
    <main class="reset-page">
      <div class="reset-card">
        <div class="reset-logo">Resume Pilot</div>

        <h1>Create a new password</h1>

        <p>Enter a new password for your Resume Pilot account.</p>

        <form id="resetPasswordForm">
          <input
            type="password"
            id="newPassword"
            placeholder="New password"
            required
            minlength="6"
          />

          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm password"
            required
            minlength="6"
          />

          <button type="submit" class="auth-submit" id="resetSubmit">
            Save password
          </button>
        </form>

        <a href="/en/" class="reset-back">← Back to home</a>
      </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script>
      const API_URL = "https://resumepilot-w360.onrender.com";

      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      function showToast(message, type = "info") {
        const container = document.getElementById("toastContainer");

        if (!container) {
          alert(message);
          return;
        }

        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.textContent = message;

        container.appendChild(toast);

        setTimeout(() => {
          toast.remove();
        }, 3500);
      }

      const resetForm = document.getElementById("resetPasswordForm");
      const newPassword = document.getElementById("newPassword");
      const confirmPassword = document.getElementById("confirmPassword");
      const resetSubmit = document.getElementById("resetSubmit");

      resetForm?.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!token) {
          showToast("Invalid reset link", "error");
          return;
        }

        if (newPassword.value !== confirmPassword.value) {
          showToast("Passwords do not match", "error");
          return;
        }

        const originalText = resetSubmit.textContent;

        try {
          resetSubmit.disabled = true;
          resetSubmit.classList.add("loading");
          resetSubmit.textContent = "Saving...";

          const res = await fetch(`${API_URL}/api/auth/reset-password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              token,
              password: newPassword.value,
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            showToast(data.message || "Password reset error", "error");
            return;
          }

          showToast("Password changed successfully", "success");

          setTimeout(() => {
            window.location.href = "/en/";
          }, 1800);
        } catch (err) {
          console.error(err);
          showToast("Connection error", "error");
        } finally {
          resetSubmit.disabled = false;
          resetSubmit.classList.remove("loading");
          resetSubmit.textContent = originalText;
        }
      });
    </script>
  </body>
</html>
