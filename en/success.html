<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRO активирован | Resume Pilot</title>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #26315f, #0f1117 55%);
        font-family: Inter, Arial, sans-serif;
        color: white;
      }

      .success-card {
        width: 460px;
        max-width: 90%;
        padding: 44px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
        text-align: center;
      }

      .success-icon {
        font-size: 64px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 34px;
      }

      p {
        color: #b8c0d9;
        line-height: 1.7;
        margin: 16px 0 28px;
      }

      .success-list {
        text-align: left;
        background: rgba(255, 255, 255, 0.06);
        padding: 18px;
        border-radius: 16px;
        margin-bottom: 28px;
      }

      .success-list div {
        margin: 10px 0;
        color: #e8ecff;
      }

      a {
        display: inline-block;
        padding: 14px 22px;
        border-radius: 14px;
        background: #6c7bff;
        color: white;
        text-decoration: none;
        font-weight: 700;
        transition: 0.25s;
      }

      a:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 30px rgba(108, 123, 255, 0.35);
      }
    </style>
  </head>

  <body>
    <div class="success-card">
      <div class="success-icon">🎉</div>

      <h1>PRO Activated</h1>

      <p>
        Your payment was successful. You now have access to premium resume
        templates and all PRO features in Resume Pilot.
      </p>

      <div class="success-list">
        <div>✅ Premium templates unlocked</div>
        <div>✅ Unlimited PDF exports</div>
        <div>✅ Lifetime access</div>
        <div>✅ Future AI features</div>
      </div>

      <a href="./index.html">Back to Resume Builder</a>
    </div>
  </body>
</html>
