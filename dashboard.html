<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Личный кабинет | Resume Pilot</title>
    <link rel="icon" href="/img/favicon.ico" />
    <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />

    <link rel="stylesheet" href="dashboard.css" />
  </head>

  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <a href="dashboard-ru.html" class="logo"> <span>Resume</span>Pilot </a>

        <nav class="sidebar-nav">
          <a href="dashboard-ru.html" class="active">Мои резюме</a>
          <a href="index-ru.html">Создать резюме</a>
          <a href="account-ru.html">Аккаунт</a>
        </nav>

        <button class="logout-btn" id="logoutBtn">Выйти</button>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Личный кабинет</p>
            <h1>Мои резюме</h1>
          </div>

          <button class="primary-btn" id="newResumeBtn">
            + Создать резюме
          </button>
        </header>

        <section class="stats">
          <div class="stat-card">
            <span>Всего резюме</span>
            <strong id="totalResumes">0</strong>
          </div>

          <div class="stat-card">
            <span>Бесплатные шаблоны</span>
            <strong>6</strong>
          </div>

          <div class="stat-card pro">
            <span>PRO шаблоны</span>
            <strong>9</strong>
          </div>
        </section>

        <section class="resume-section">
          <div class="section-head">
            <h2>Сохранённые резюме</h2>
            <p>Создавайте, редактируйте и управляйте своими резюме.</p>
          </div>

          <div class="resume-grid" id="resumeGrid">
            <!-- Карточки добавляются через dashboard.js -->
          </div>

          <div class="empty-state" id="emptyState">
            <div class="empty-icon">📄</div>

            <h3>У вас пока нет резюме</h3>

            <p>Создайте своё первое резюме и начните путь к новой работе.</p>

            <button class="primary-btn" id="emptyCreateBtn">
              Создать резюме
            </button>
          </div>
        </section>
      </main>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
