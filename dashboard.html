<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard | Resume Pilot</title>

    <link rel="stylesheet" href="dashboard.css" />
  </head>

  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <a href="dashboard.html" class="logo"> <span>Resume</span>Pilot </a>

        <nav class="sidebar-nav">
          <a href="dashboard.html" class="active">My Resumes</a>
          <a href="builder.html">Create Resume</a>
          <a href="account.html">Account</a>
        </nav>

        <button class="logout-btn" id="logoutBtn">Log out</button>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Dashboard</p>
            <h1>My resumes</h1>
          </div>

          <button class="primary-btn" id="newResumeBtn">+ New Resume</button>
        </header>

        <section class="stats">
          <div class="stat-card">
            <span>Total resumes</span>
            <strong id="totalResumes">0</strong>
          </div>

          <div class="stat-card">
            <span>Free templates</span>
            <strong>6</strong>
          </div>

          <div class="stat-card pro">
            <span>PRO templates</span>
            <strong>9</strong>
          </div>
        </section>

        <section class="resume-section">
          <div class="section-head">
            <h2>Saved resumes</h2>
            <p>Create, edit and manage your resumes.</p>
          </div>

          <div class="resume-grid" id="resumeGrid">
            <!-- Cards from dashboard.js -->
          </div>

          <div class="empty-state" id="emptyState">
            <div class="empty-icon">📄</div>
            <h3>No resumes yet</h3>
            <p>
              Create your first resume and start building your career story.
            </p>
            <button class="primary-btn" id="emptyCreateBtn">
              Create Resume
            </button>
          </div>
        </section>
      </main>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
